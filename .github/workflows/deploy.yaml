name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows you to trigger an update manually from the "Actions" tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Set up Python to handle the Excel files
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install pandas openpyxl

      # 2. Run the sync script to generate src/data.json from your Excel files
      # Make sure sync_data.py is located in a folder named 'scripts'
      - name: Run Sync Script
        run: python scripts/sync_data.py

      # 3. Set up Node.js for the React build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install JS Dependencies
        run: npm install

      # 4. Build the project (it will now use the freshly generated data.json)
      - name: Build Project
        run: npm run build

      # 5. Deploy the 'dist' folder to GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
